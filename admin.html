<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCS2 Admin</title>
<style>
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f4; --bg-danger: #fcebeb;
    --bg-success: #eaf3de; --bg-info: #e6f1fb; --bg-warning: #faeeda;
    --text: #1a1a18; --text-secondary: #5f5e5a; --text-tertiary: #888780;
    --text-danger: #a32d2d; --text-success: #3b6d11; --text-info: #185fa5;
    --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.25);
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #2a2a28; --bg-danger: #501313;
      --bg-success: #173404; --bg-info: #042c53; --bg-warning: #412402;
      --text: #f0ede8; --text-secondary: #b4b2a9; --text-tertiary: #888780;
      --text-danger: #f7c1c1; --text-success: #c0dd97; --text-info: #b5d4f4;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.22);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg-secondary); color: var(--text); min-height: 100vh; }

  /* Auth */
  #authScreen { position: fixed; inset: 0; background: var(--bg-secondary); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .auth-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 32px 24px; width: 100%; max-width: 360px; }
  .auth-logo { font-size: 13px; font-weight: 600; color: var(--text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 24px; }
  .auth-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .auth-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.5; }
  .auth-btn { width: 100%; padding: 14px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; }
  .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .auth-status { margin-top: 16px; padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; line-height: 1.5; }
  .auth-status.info { background: var(--bg-info); color: var(--text-info); }
  .auth-status.err { background: var(--bg-danger); color: var(--text-danger); }
  .auth-status.ok { background: var(--bg-success); color: var(--text-success); }
  .hidden { display: none; }

  /* Admin UI */
  .header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { }
  .header-title { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .logout-btn { background: none; border: 0.5px solid var(--border-strong); border-radius: 20px; color: var(--text-secondary); font-size: 12px; padding: 5px 12px; cursor: pointer; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .stat-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px; }
  .stat-val { font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  /* Filter */
  .filter-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .filter-input { padding: 9px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg); color: var(--text); outline: none; }
  .filter-input:focus { border-color: var(--text); }
  .filter-select { padding: 9px 12px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg); color: var(--text); outline: none; cursor: pointer; }
  .refresh-btn { padding: 9px 16px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; }

  /* Table */
  .table-wrap { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { display: grid; grid-template-columns: 2fr 1.2fr 1fr 1.2fr; padding: 10px 16px; background: var(--bg-secondary); border-bottom: 0.5px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
  .table-row { display: grid; grid-template-columns: 2fr 1.2fr 1fr 1.2fr; padding: 12px 16px; border-bottom: 0.5px solid var(--border); font-size: 13px; align-items: center; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--bg-secondary); }
  .badge-type { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .badge-type.new { background: var(--bg-info); color: var(--text-info); }
  .badge-type.auto { background: var(--bg-success); color: var(--text-success); }
  .empty-state { text-align: center; padding: 48px; color: var(--text-tertiary); font-size: 14px; }
  .loading-state { text-align: center; padding: 48px; color: var(--text-secondary); font-size: 14px; }
  .count-info { font-size: 13px; color: var(--text-tertiary); margin-bottom: 10px; }
</style>
</head>
<body>

<!-- Auth -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo" id="authLogo" onclick="secretClick()" style="cursor:default;user-select:none;">CTK TCS · Admin</div>
    <div class="auth-title">관리자 로그인</div>
    <div class="auth-sub" id="authSubText">관리자 이메일로 인증 코드를 받아 로그인하세요.</div>
    <div id="emailStep">
      <input type="text" id="emailInput" placeholder="이메일 주소 입력" style="width:100%;padding:12px 14px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);font-size:16px;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;" oninput="onEmailInput()" onkeydown="if(event.key==='Enter') sendOTP()">
      <button class="auth-btn" id="authBtn" onclick="sendOTP()" disabled>인증 코드 받기</button>
    </div>
    <!-- 비밀번호 모드 -->
    <div id="pwStep" class="hidden">
      <input type="password" id="pwInput" placeholder="비밀번호 입력" style="width:100%;padding:12px 14px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);font-size:16px;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;" oninput="onPwInput()" onkeydown="if(event.key==='Enter') loginWithPassword()">
      <button class="auth-btn" id="pwBtn" onclick="loginWithPassword()" disabled>로그인</button>
    </div>
    <div id="otpStep" class="hidden">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;" id="otpSentTo"></div>
      <input type="text" id="otpInput" placeholder="6자리 코드 입력" maxlength="6" inputmode="numeric" style="width:100%;padding:12px 14px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);font-size:22px;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;letter-spacing:0.3em;text-align:center;" oninput="onOTPInput()" onkeydown="if(event.key==='Enter') verifyOTP()">
      <button class="auth-btn" id="otpBtn" onclick="verifyOTP()" disabled>확인</button>
      <div style="text-align:center;margin-top:12px;">
        <button onclick="resetAuth()" style="background:none;border:none;color:var(--text-tertiary);font-size:13px;cursor:pointer;text-decoration:underline;">이메일 다시 입력</button>
      </div>
    </div>
    <div id="authStatus" class="hidden auth-status"></div>
  </div>
</div>

<!-- Admin UI -->
<div id="adminApp" class="hidden">
  <div class="header">
    <div class="header-left">
      <div class="header-title">TCS Pro 관리자</div>
      <div class="header-sub" id="adminEmail"></div>
    </div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>

  <div style="display:flex; height:calc(100vh - 53px);">
    <!-- 왼쪽 유저 슬라이서 -->
    <div style="width:220px; flex-shrink:0; background:var(--bg); border-right:0.5px solid var(--border); overflow-y:auto; padding:16px 0;">
      <div style="padding:0 16px 10px; font-size:12px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.05em;">사용자</div>
      <div id="userList"></div>
    </div>

    <!-- 오른쪽 메인 -->
    <div style="flex:1; overflow-y:auto; padding:20px;">
      <!-- Stats -->
      <div class="stats-grid" style="margin-bottom:16px;">
        <div class="stat-card">
          <div class="stat-label">전체 접속</div>
          <div class="stat-val" id="statTotal">—</div>
          <div class="stat-sub">누적 로그 수</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">오늘 접속</div>
          <div class="stat-val" id="statToday">—</div>
          <div class="stat-sub" id="statTodayDate">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">접속 사용자</div>
          <div class="stat-val" id="statUsers">—</div>
          <div class="stat-sub">고유 이메일 수</div>
        </div>
      </div>

      <!-- 탭 -->
      <div style="display:flex; gap:8px; margin-bottom:14px;">
        <button class="search-tab active" id="tab-access" onclick="switchTab('access')" style="flex:none;padding:8px 20px;">접속 로그</button>
        <button class="search-tab" id="tab-action" onclick="switchTab('action')" style="flex:none;padding:8px 20px;">액션 로그</button>
        <button class="search-tab" id="tab-stats" onclick="switchTab('stats')" style="flex:none;padding:8px 20px;">📊 통계 · KPI</button>
        <button class="refresh-btn" onclick="loadAll()" style="margin-left:auto;">↻ 새로고침</button>
      </div>

      <!-- 접속 로그 -->
      <div id="panel-access">
        <div class="count-info" id="countInfo"></div>
        <div class="table-wrap">
          <div class="table-header" style="grid-template-columns:2fr 1.2fr 1fr 1fr 1fr;">
            <div>이메일</div><div>접속 시각</div><div>유형</div><div>기기</div><div>지역</div>
          </div>
          <div id="logTable"><div class="loading-state">로딩 중...</div></div>
        </div>
      </div>

      <!-- 액션 로그 -->
      <div id="panel-action" class="hidden">
        <div class="count-info" id="actionCountInfo"></div>
        <div class="table-wrap">
          <div class="table-header" style="grid-template-columns:1.5fr 1.5fr 1fr 0.8fr 0.8fr 1fr 1fr 1fr;">
            <div>이메일</div><div>아티클</div><div>패턴</div><div>RTD</div><div>결과%</div><div>보상금액</div><div>지역</div><div>시각</div>
          </div>
          <div id="actionTable"><div class="loading-state">로딩 중...</div></div>
        </div>
      </div>

      <!-- 통계 / KPI -->
      <div id="panel-stats" class="hidden">
        <div id="statsPanel"><div class="loading-state">로딩 중...</div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://thosddtgtffapakvmrhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HmrBU9WFhkCTM_TquLM31g_IPovXtXm';
const ADMIN_EMAIL = 'jaehong.park@continental.com';

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false }
});

let allLogs = [], allActions = [], selectedUser = null, currentTab = 'access';

// ── Secret mode (logo 5번 클릭, 관리자 이메일 입력 후) ───────
let _secretClicks = 0, _secretTimer = null, _pwMode = false;
window.secretClick = function() {
  const email = document.getElementById('emailInput').value.trim().toLowerCase();
  if (email !== ADMIN_EMAIL) return;
  _secretClicks++;
  if (_secretTimer) clearTimeout(_secretTimer);
  _secretTimer = setTimeout(() => { _secretClicks = 0; }, 2000);
  if (_secretClicks >= 5) {
    _secretClicks = 0;
    _pwMode = !_pwMode;
    document.getElementById('emailStep').classList.toggle('hidden', _pwMode);
    document.getElementById('pwStep').classList.toggle('hidden', !_pwMode);
    document.getElementById('otpStep').classList.add('hidden');
    document.getElementById('authStatus').classList.add('hidden');
    document.getElementById('authSubText').textContent = _pwMode
      ? '비밀번호로 로그인합니다.'
      : '관리자 이메일로 인증 코드를 받아 로그인하세요.';
    if (_pwMode) document.getElementById('pwInput').focus();
  }
};
window.onPwInput = function() {
  document.getElementById('pwBtn').disabled = document.getElementById('pwInput').value.trim().length < 1;
};
window.loginWithPassword = async function() {
  const btn = document.getElementById('pwBtn');
  btn.disabled = true; btn.textContent = '로그인 중...';
  try {
    const { data, error } = await _supabase.auth.signInWithPassword({
      email: ADMIN_EMAIL,
      password: document.getElementById('pwInput').value.trim()
    });
    if (error) throw error;
    showAdmin(data.user.email);
  } catch(e) {
    showAuthError('비밀번호가 올바르지 않습니다.');
    btn.disabled = false; btn.textContent = '로그인';
  }
};

// 페이지 로드 시 세션 확인
(async () => {
  const { data: { session } } = await _supabase.auth.getSession();
  if (session && session.user.email.toLowerCase() === ADMIN_EMAIL) {
    showAdmin(session.user.email);
  } else {
    document.getElementById('authScreen').style.display = 'flex';
  }
})();

function showAdmin(email) {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('adminApp').classList.remove('hidden');
  document.getElementById('adminEmail').textContent = email;
  loadAll();
}

function showAuthError(msg) {
  const el = document.getElementById('authStatus');
  el.className = 'auth-status err';
  el.textContent = msg;
  el.classList.remove('hidden');
}

function resetAuth() {
  document.getElementById('emailStep').classList.remove('hidden');
  document.getElementById('otpStep').classList.add('hidden');
  document.getElementById('authStatus').classList.add('hidden');
  document.getElementById('emailInput').value = '';
  document.getElementById('otpInput').value = '';
  document.getElementById('authBtn').disabled = true;
}

window.onEmailInput = function() {
  document.getElementById('authBtn').disabled = !document.getElementById('emailInput').value.trim().includes('@');
};
window.onOTPInput = function() {
  document.getElementById('otpBtn').disabled = document.getElementById('otpInput').value.trim().length !== 6;
};
window.sendOTP = async function() {
  const email = document.getElementById('emailInput').value.trim();
  if (email.toLowerCase() !== ADMIN_EMAIL) { showAuthError('관리자 계정만 접근 가능합니다.'); return; }
  const btn = document.getElementById('authBtn');
  btn.disabled = true; btn.textContent = '전송 중...';
  try {
    const { error } = await _supabase.auth.signInWithOtp({ email, options: { shouldCreateUser: true, emailRedirectTo: null } });
    if (error) throw error;
    document.getElementById('emailStep').classList.add('hidden');
    document.getElementById('otpStep').classList.remove('hidden');
    document.getElementById('otpSentTo').textContent = `${email} 으로 6자리 코드를 보냈습니다`;
    document.getElementById('authStatus').classList.add('hidden');
    document.getElementById('otpInput').focus();
  } catch(e) {
    showAuthError('전송 실패: ' + e.message);
    btn.disabled = false; btn.textContent = '인증 코드 받기';
  }
};
window.verifyOTP = async function() {
  const email = document.getElementById('emailInput').value.trim();
  const token = document.getElementById('otpInput').value.trim();
  const btn = document.getElementById('otpBtn');
  btn.disabled = true; btn.textContent = '확인 중...';
  try {
    const { data, error } = await _supabase.auth.verifyOtp({ email, token, type: 'email' });
    if (error) throw error;
    if (data.user.email.toLowerCase() !== ADMIN_EMAIL) {
      await _supabase.auth.signOut();
      showAuthError('관리자 계정만 접근 가능합니다.');
      btn.disabled = false; btn.textContent = '확인'; return;
    }
    showAdmin(data.user.email);
  } catch(e) {
    showAuthError('코드가 올바르지 않거나 만료되었습니다.');
    btn.disabled = false; btn.textContent = '확인';
  }
};
window.logout = async function() { await _supabase.auth.signOut(); location.reload(); };
window.resetAuth = resetAuth;

// ── Tab ───────────────────────────────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  ['access','action','stats'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
  });
  if (tab === 'access') renderAccessLogs();
  else if (tab === 'action') renderActionLogs();
  else renderStats();
};

// ── Load all ──────────────────────────────────────────────────
window.loadAll = async function() {
  document.getElementById('logTable').innerHTML = '<div class="loading-state">로딩 중...</div>';
  document.getElementById('actionTable').innerHTML = '<div class="loading-state">로딩 중...</div>';
  try {
    const [accessRes, actionRes, sessionRes] = await Promise.all([
      _supabase.from('access_logs').select('*').order('created_at', { ascending: false }).limit(500),
      _supabase.from('action_logs').select('*').order('created_at', { ascending: false }).limit(500),
      _supabase.from('sessions').select('*').order('session_start', { ascending: false }).limit(500)
    ]);
    if (accessRes.error) throw accessRes.error;
    if (actionRes.error) throw actionRes.error;
    allLogs = accessRes.data;
    allActions = actionRes.data;
    allSessions = sessionRes.error ? [] : sessionRes.data;

    // banned users 로드
    const bannedRes = await _supabase.from('banned_users').select('email');
    if (!bannedRes.error) {
      bannedUsers.clear();
      bannedRes.data.forEach(b => bannedUsers.add(b.email));
    }
    updateStats();
    renderUserList();
    renderAccessLogs();
    renderActionLogs();
  } catch(e) {
    document.getElementById('logTable').innerHTML = `<div class="empty-state">오류: ${e.message}</div>`;
  }
};

// ── User list (slicer) with Ban ───────────────────────────────
function renderUserList() {
  const users = [...new Set(allLogs.map(l => l.email).filter(Boolean))].sort();
  const activeUsers = users.filter(u => !bannedUsers.has(u));
  const banned = users.filter(u => bannedUsers.has(u));
  const ul = document.getElementById('userList');

  let html = `
    <div style="padding:8px 16px 4px;font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;">KPI 포함 여부</div>
    <div onclick="selectUser(null)" style="padding:8px 16px;font-size:13px;cursor:pointer;color:${!selectedUser?'var(--text)':'var(--text-secondary)'};font-weight:${!selectedUser?'600':'400'};border-left:3px solid ${!selectedUser?'var(--text)':'transparent'};">전체 (${activeUsers.length}명)</div>`;

  activeUsers.forEach(u => {
    const cnt = allLogs.filter(l => l.email === u).length;
    const isSelected = selectedUser === u;
    const isExcluded = excludedFromKPI.has(u);
    html += `
      <div style="border-left:3px solid ${isSelected?'var(--text)':'transparent'};">
        <div style="padding:8px 16px 2px;display:flex;align-items:flex-start;gap:8px;">
          <input type="checkbox" ${isExcluded?'':'checked'} onchange="toggleKPI('${u}', this.checked)" style="margin-top:2px;flex-shrink:0;cursor:pointer;" title="KPI에 포함">
          <div onclick="selectUser('${u}')" style="font-size:12px;cursor:pointer;color:${isSelected?'var(--text)':'var(--text-secondary)'};font-weight:${isSelected?'600':'400'};word-break:break-all;line-height:1.4;${isExcluded?'opacity:0.4;':''}">
            ${u}
            <span style="display:block;font-size:11px;color:var(--text-tertiary);">${cnt}회 접속</span>
          </div>
        </div>
        <div style="padding:0 16px 8px;">
          <button onclick="toggleBan('${u}', false)" style="font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid var(--text-danger);background:none;color:var(--text-danger);cursor:pointer;">Ban</button>
        </div>
      </div>`;
  });

  if (banned.length > 0) {
    html += `<div style="margin:12px 16px 6px;font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;border-top:0.5px solid var(--border);padding-top:12px;">🚫 Banned (${banned.length})</div>`;
    banned.forEach(u => {
      const cnt = allLogs.filter(l => l.email === u).length;
      html += `
        <div style="opacity:0.5;border-left:3px solid transparent;">
          <div style="padding:8px 16px 4px;font-size:12px;color:var(--text-tertiary);word-break:break-all;line-height:1.4;">
            ${u}<span style="display:block;font-size:11px;">${cnt}회 접속</span>
          </div>
          <div style="padding:0 16px 8px;">
            <button onclick="toggleBan('${u}', true)" style="font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid var(--text-success);background:none;color:var(--text-success);cursor:pointer;">Ban 해제</button>
          </div>
        </div>`;
    });
  }
  ul.innerHTML = html;
}

const excludedFromKPI = new Set();
window.toggleKPI = function(email, included) {
  if (included) excludedFromKPI.delete(email);
  else excludedFromKPI.add(email);
  renderUserList();
  if (currentTab === 'stats') renderStats();
};

const bannedUsers = new Set();
window.toggleBan = async function(email, isBanned) {
  if (!confirm(`${email} 을 ${isBanned?'Ban 해제':'Ban'} 하시겠습니까?`)) return;
  if (isBanned) {
    bannedUsers.delete(email);
  } else {
    bannedUsers.add(email);
  }
  // Supabase Auth에서 직접 ban은 Admin API 필요 — 여기선 banned_users 테이블로 관리
  try {
    if (isBanned) {
      await _supabase.from('banned_users').delete().eq('email', email);
    } else {
      await _supabase.from('banned_users').insert({ email });
    }
  } catch(e) { console.warn('Ban 처리 실패 (테이블 없을 수 있음):', e); }
  renderUserList();
};

window.selectUser = function(user) {
  selectedUser = user;
  renderUserList();
  renderAccessLogs();
  renderActionLogs();
  if (currentTab === 'stats') renderStats();
};

// ── Stats ─────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statTotal').textContent = allLogs.length.toLocaleString();
  const today = new Date().toLocaleDateString('ko-KR');
  const todayCount = allLogs.filter(l => l.created_at && new Date(l.created_at).toLocaleDateString('ko-KR') === today).length;
  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statTodayDate').textContent = today;
  document.getElementById('statUsers').textContent = new Set(allLogs.map(l => l.email)).size;
}

// ── Access logs ───────────────────────────────────────────────
function renderAccessLogs() {
  const filtered = selectedUser ? allLogs.filter(l => l.email === selectedUser) : allLogs;
  document.getElementById('countInfo').textContent = `${filtered.length}개 표시 중 (전체 ${allLogs.length}개)`;
  if (!filtered.length) { document.getElementById('logTable').innerHTML = '<div class="empty-state">로그 없음</div>'; return; }
  document.getElementById('logTable').innerHTML = filtered.map(l => {
    const ts = l.created_at ? new Date(l.created_at).toLocaleString('ko-KR') : '—';
    const ua = l.user_agent || '';
    const device = ua.includes('iPhone') ? '📱 iPhone' : ua.includes('Android') ? '📱 Android' : ua.includes('iPad') ? '📱 iPad' : '💻 Desktop';
    const typeBadge = l.type === 'OTP인증' ? '<span class="badge-type new">OTP인증</span>' : `<span class="badge-type auto">${l.type||'—'}</span>`;
    return `<div class="table-row" style="grid-template-columns:2fr 1.2fr 1fr 1fr 1fr;">
      <div style="font-size:13px;font-weight:500;">${l.email||'—'}</div>
      <div style="font-size:12px;color:var(--text-secondary);">${ts}</div>
      <div>${typeBadge}</div>
      <div style="font-size:12px;color:var(--text-secondary);">${device}</div>
      <div style="font-size:12px;color:var(--text-secondary);">${l.location||'—'}</div>
    </div>`;
  }).join('');
}

// ── Action logs ───────────────────────────────────────────────
function renderActionLogs() {
  const filtered = selectedUser ? allActions.filter(l => l.email === selectedUser) : allActions;
  document.getElementById('actionCountInfo').textContent = `${filtered.length}개 표시 중 (전체 ${allActions.length}개)`;
  if (!filtered.length) { document.getElementById('actionTable').innerHTML = '<div class="empty-state">액션 로그 없음</div>'; return; }
  document.getElementById('actionTable').innerHTML = filtered.map(l => {
    const ts = l.created_at ? new Date(l.created_at).toLocaleString('ko-KR') : '—';
    const credit = l.credit_amt != null ? Math.round(l.credit_amt).toLocaleString('ko-KR') + '원' : '—';
    return `<div class="table-row" style="grid-template-columns:1.5fr 1.5fr 1fr 0.8fr 0.8fr 1fr 1fr 1fr;">
      <div style="font-size:12px;font-weight:500;">${l.email||'—'}</div>
      <div style="font-size:12px;">${l.article||'—'}</div>
      <div style="font-size:11px;color:var(--text-secondary);">${l.pattern||'—'}</div>
      <div style="font-size:12px;">${l.rtd!=null?l.rtd+'mm':'—'}</div>
      <div style="font-size:13px;font-weight:600;">${l.result_pct!=null?l.result_pct+'%':'—'}</div>
      <div style="font-size:12px;">${credit}</div>
      <div style="font-size:12px;color:var(--text-secondary);">${l.location||'—'}</div>
      <div style="font-size:11px;color:var(--text-secondary);">${ts}</div>
    </div>`;
  }).join('');
}

// ── Stats / KPI ───────────────────────────────────────────────
let allSessions = [];
let MINS_SAVED_PER_CALC = 2;

function renderStats() {
  const kpiActions = allActions.filter(a => !excludedFromKPI.has(a.email));
  const kpiSessions = allSessions.filter(s => !excludedFromKPI.has(s.email));

  const sessions = selectedUser ? kpiSessions.filter(s => s.email === selectedUser) : kpiSessions;
  const actions = selectedUser ? kpiActions.filter(a => a.email === selectedUser) : kpiActions;
  const users = [...new Set(allLogs.map(l => l.email).filter(Boolean))].filter(u => !excludedFromKPI.has(u));

  const totalCalcs = actions.filter(a => a.action_type === '보상계산').length;
  const totalPriceOnly = actions.filter(a => a.action_type === '가격조회').length;
  const totalTimeSaved = totalCalcs * MINS_SAVED_PER_CALC;
  const totalSessions = sessions.length;
  const avgDuration = sessions.length > 0 ? sessions.reduce((sum, s) => {
    if (!s.session_start || !s.last_seen) return sum;
    return sum + (new Date(s.last_seen) - new Date(s.session_start)) / 60000;
  }, 0) / sessions.length : 0;

  const userStats = users.map(u => {
    const uSessions = kpiSessions.filter(s => s.email === u);
    const uActions = kpiActions.filter(a => a.email === u);
    const uCalcs = uActions.filter(a => a.action_type === '보상계산').length;
    const uPriceOnly = uActions.filter(a => a.action_type === '가격조회').length;
    const uTimeSaved = uCalcs * MINS_SAVED_PER_CALC;
    const uAvgDur = uSessions.length > 0 ? uSessions.reduce((sum, s) => {
      if (!s.session_start || !s.last_seen) return sum;
      return sum + (new Date(s.last_seen) - new Date(s.session_start)) / 60000;
    }, 0) / uSessions.length : 0;
    const days = new Set(uSessions.map(s => s.session_start?.slice(0,10))).size || 1;
    const dailyAvg = (uSessions.length / days).toFixed(1);
    return { email: u, sessions: uSessions.length, calcs: uCalcs, priceOnly: uPriceOnly, timeSaved: uTimeSaved, avgDur: uAvgDur, dailyAvg };
  }).filter(u => !selectedUser || u.email === selectedUser);

  const el = document.getElementById('statsPanel');
  el.innerHTML = `
    <!-- 절약 시간 설정 -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);">
      <span style="font-size:13px;color:var(--text-secondary);">계산 1회당 절약 시간:</span>
      <input type="number" id="minsInput" value="${MINS_SAVED_PER_CALC}" min="1" max="60" style="width:60px;padding:6px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text);">
      <span style="font-size:13px;color:var(--text-secondary);">분</span>
      <button onclick="updateMins()" style="padding:6px 14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;">적용</button>
      <span style="font-size:11px;color:var(--text-tertiary);margin-left:8px;">※ KPI 제외된 유저는 통계에서 제외됩니다</span>
    </div>
    <!-- 전체 KPI -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;">
      <div class="stat-card"><div class="stat-label">보상계산 횟수</div><div class="stat-val">${totalCalcs}</div><div class="stat-sub">누적</div></div>
      <div class="stat-card"><div class="stat-label">가격조회만</div><div class="stat-val" style="color:var(--text-danger);">${totalPriceOnly}</div><div class="stat-sub">보상계산 없이 종료</div></div>
      <div class="stat-card"><div class="stat-label">절약 시간</div><div class="stat-val">${totalTimeSaved}분</div><div class="stat-sub">계산 1회 = ${MINS_SAVED_PER_CALC}분</div></div>
      <div class="stat-card"><div class="stat-label">총 세션</div><div class="stat-val">${totalSessions}</div><div class="stat-sub">누적</div></div>
      <div class="stat-card"><div class="stat-label">평균 세션 시간</div><div class="stat-val">${avgDuration.toFixed(1)}분</div><div class="stat-sub">포그라운드 기준</div></div>
    </div>
    <!-- 유저별 테이블 -->
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 1fr;">
        <div>이메일</div><div>총 접속</div><div>일평균</div><div>평균 세션</div><div>보상계산</div><div>가격조회만</div><div>절약 시간</div>
      </div>
      ${userStats.map(u => `
        <div class="table-row" style="grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 1fr;">
          <div style="font-size:13px;font-weight:500;">${u.email}</div>
          <div style="font-size:13px;">${u.sessions}회</div>
          <div style="font-size:13px;">${u.dailyAvg}회/일</div>
          <div style="font-size:13px;">${u.avgDur.toFixed(1)}분</div>
          <div style="font-size:13px;font-weight:600;">${u.calcs}회</div>
          <div style="font-size:13px;color:${u.priceOnly>0?'var(--text-danger)':'var(--text-tertiary)'};">${u.priceOnly}회</div>
          <div style="font-size:13px;color:var(--text-success);font-weight:600;">${u.timeSaved}분</div>
        </div>`).join('')}
    </div>`;
}

window.updateMins = function() {
  const val = parseInt(document.getElementById('minsInput').value);
  if (isNaN(val) || val < 1) return;
  MINS_SAVED_PER_CALC = val;
  renderStats();
};
</script>

</body>
</html>
